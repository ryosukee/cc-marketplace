# Claude Code の既知バグ・制約とワークアラウンドの台帳
#
# このファイルは claude-known-issues plugin の初期テンプレート。
# 実体は ${CLAUDE_PLUGIN_DATA}/known-issues.yml にコピーされ、以後はそちらが正。
#
# status: open (未修正・解除ウォッチ対象) | resolved (修正済み・解除完了) | permanent (仕様。解除見込みなし)
# keywords は changelog 側の英語表現で書く (公式 changelog は issue 番号をほぼ使わない)

entries:
  - id: claude-dir-write-protection
    title: .claude/ への書き込み保護
    kind: 仕様
    status: permanent
    summary: |
      Write/Edit ツール (v2.1.78〜) と Bash の cp/mv (v2.1.86〜) が .claude/ への
      書き込みをブロックする。公式の permissions ドキュメントに保護対象ディレクトリとして
      .git/ や .vscode/ と同列で明記されており、bypassPermissions でも対象。
    affected: v2.1.78 以降 (継続・強化方向)
    refs:
      - https://code.claude.com/docs/en/iam
    keywords:
      - protected directories
      - writes to `.claude/`
    workarounds:
      - dotclaude-writer plugin の dotclaude-writer skill (スクリプト経由の書き込み)
    release_criteria: |
      仕様のため解除見込みなし。保護対象から .claude/ が外れた場合のみ再検討する。
    release_steps: |
      (解除見込みなしのため未定義)
    log:
      - 2026-07-22: 公式ドキュメントで仕様として明記されていることを確認。バグではない

  - id: askuserquestion-rendering
    title: AskUserQuestion のレンダリングバグ
    kind: バグ
    status: open
    summary: |
      同一ターン内でツール呼び出しに挟まれた assistant テキストが TUI に表示されない。
      AskUserQuestion 直前のテキストが最悪ケースで、事前テキストが表示されず質問 UI だけが出る。
    affected: v2.1.170 頃〜 (v2.1.216 時点で未修正)
    refs:
      - https://github.com/anthropics/claude-code/issues/75182
      - https://github.com/anthropics/claude-code/issues/75034
      - https://github.com/anthropics/claude-code/issues/67071
    keywords:
      - text between tool uses
      - assistant text not rendering
      - tool use rendering
    workarounds:
      - claude-user-communication plugin の ask-with-choices skill (冒頭の AskUserQuestion 使用禁止の警告とターン分割節)
      - claude-user-communication plugin の html-communication skill (複雑な確認を HTML フォームに寄せる適用基準)
    release_criteria: |
      上記 issue のいずれかが closed になり、同一ターン内でツール呼び出しに挟まれた
      テキストが TUI に表示されることを実機で確認できたら解除する。
    release_steps: |
      1. ask-with-choices skill 冒頭の WARNING (AskUserQuestion 使用禁止) を削除する
      2. 同 skill の「AskUserQuestion を単独ターンで発行する (レンダリングバグ回避)」節を削除し、
         ターン分割への言及を元に戻す
      3. html-communication skill の適用基準から、レンダリングバグを理由とした注記を外す
      4. この台帳エントリの status を resolved にする
    log:
      - 2026-07-23: v2.1.216 時点で 3 件とも open。修正の記載なし

  - id: task-tools-unavailable
    title: タスク管理ツールの UI バグと不提供
    kind: バグ
    status: open
    summary: |
      タスクリストの固定表示が壊れる UI バグ (#80151) に加え、環境によっては
      ツール一覧に TaskCreate 系が現れない (原因未特定。バージョンではなく提供構成の差の可能性)。
    affected: UI バグは v2.1.208 の UI 最適化以降 (v2.1.217 時点で未修正)。不提供は条件不明
    refs:
      - https://github.com/anthropics/claude-code/issues/80151
    keywords:
      - task list
      - TaskCreate
      - task panel
    workarounds:
      - session plugin の start / handover / retrospective skill (draft のタスクボードで進行管理する代替手順)
    release_criteria: |
      #80151 が closed になり、かつ task 系ツールが安定して提供されることを実機で確認できたら解除する。
    release_steps: |
      1. session plugin の start / handover / retrospective から、TaskCreate 不提供環境の
         代替手順の記述を削除するか、注記に格下げする
      2. この台帳エントリの status を resolved にする
    log:
      - 2026-07-23: v2.1.217 時点で #80151 は open。ツール不提供の再現条件は未特定
